<div class="auth-container">
  <div class="glass-panel">
    <div class="logo">
      <mat-icon color="primary">view_kanban</mat-icon>
      <h1>Zask</h1>
    </div>
    
    <h2>Welcome Back!</h2>
    <p class="subtitle">Log in to continue managing your tasks.</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Username</mat-label>
        <input matInput formControlName="username" placeholder="Enter your username">
        <mat-icon matPrefix>person</mat-icon>
        <mat-error *ngIf="loginForm.get('username')?.hasError('required')">
          Username is required
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" placeholder="Enter your password">
        <mat-icon matPrefix>lock</mat-icon>
        <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
          Password is required
        </mat-error>
      </mat-form-field>

      <div class="error-message" *ngIf="errorMessage">
        <mat-icon>error_outline</mat-icon>
        <span>{{ errorMessage }}</span>
      </div>

      <button mat-flat-button color="primary" class="submit-btn" type="submit" [disabled]="loginForm.invalid || isLoading">
        <span *ngIf="!isLoading">Log In</span>
        <mat-spinner diameter="24" *ngIf="isLoading"></mat-spinner>
      </button>

    </form>

    <div class="footer">
      <span>Don't have an account? <a routerLink="/register">Sign up</a></span>
    </div>
  </div>
</div>
