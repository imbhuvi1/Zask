<div class="auth-container">
  <div class="glass-card">
    <div class="auth-header">
      <div class="logo">
        <mat-icon>lock_reset</mat-icon>
      </div>
      <h2>Reset Password</h2>
      <p>Enter your email and we'll send you a reset link.</p>
    </div>

    <div *ngIf="isSent()" class="success-message">
      <mat-icon color="primary">mark_email_read</mat-icon>
      <h3>Check your inbox</h3>
      <p>If an account exists for that email, we have sent a reset link.</p>
      <button mat-button color="primary" routerLink="/login">Back to Login</button>
    </div>

    <form *ngIf="!isSent()" [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
      
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" placeholder="Enter your email">
        <mat-icon matPrefix>email</mat-icon>
        <mat-error *ngIf="forgotForm.get('email')?.hasError('required')">
          Email is required
        </mat-error>
        <mat-error *ngIf="forgotForm.get('email')?.hasError('email')">
          Please enter a valid email address
        </mat-error>
      </mat-form-field>

      <div class="error-message" *ngIf="errorMessage()">
        {{ errorMessage() }}
      </div>

      <button mat-flat-button color="primary" class="full-width submit-btn" 
              type="submit" [disabled]="forgotForm.invalid || isLoading()">
        <span *ngIf="!isLoading()">Send Reset Link</span>
        <span *ngIf="isLoading()">Sending...</span>
      </button>

      <div class="auth-links">
        <a routerLink="/login">Back to Login</a>
      </div>
    </form>
  </div>
</div>
