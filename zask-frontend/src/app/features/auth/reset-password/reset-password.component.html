<div class="auth-container">
  <div class="glass-card">
    <div class="auth-header">
      <div class="logo">
        <mat-icon>vpn_key</mat-icon>
      </div>
      <h2>Create New Password</h2>
      <p>Please enter your new strong password.</p>
    </div>

    <div *ngIf="isSuccess()" class="success-message">
      <mat-icon color="primary">check_circle</mat-icon>
      <h3>Password Reset!</h3>
      <p>Your password has been changed successfully.</p>
      <p>Redirecting to login...</p>
    </div>

    <form *ngIf="!isSuccess()" [formGroup]="resetForm" (ngSubmit)="onSubmit()">
      
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>New Password</mat-label>
        <input matInput type="password" formControlName="newPassword" placeholder="Enter new password">
        <mat-icon matPrefix>lock</mat-icon>
        <mat-error *ngIf="resetForm.get('newPassword')?.hasError('required')">
          Password is required
        </mat-error>
        <mat-error *ngIf="resetForm.get('newPassword')?.hasError('minlength')">
          Password must be at least 6 characters
        </mat-error>
      </mat-form-field>

      <div class="error-message" *ngIf="errorMessage()">
        {{ errorMessage() }}
      </div>

      <button mat-flat-button color="primary" class="full-width submit-btn" 
              type="submit" [disabled]="resetForm.invalid || isLoading() || !resetToken">
        <span *ngIf="!isLoading()">Update Password</span>
        <span *ngIf="isLoading()">Updating...</span>
      </button>

      <div class="auth-links">
        <a routerLink="/login">Back to Login</a>
      </div>
    </form>
  </div>
</div>
