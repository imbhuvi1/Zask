server.port=8080
spring.application.name=api-gateway

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Routes
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

spring.cloud.gateway.routes[1].id=workspace-service
spring.cloud.gateway.routes[1].uri=lb://workspace-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/workspaces/**

spring.cloud.gateway.routes[2].id=board-service
spring.cloud.gateway.routes[2].uri=lb://board-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/boards/**

spring.cloud.gateway.routes[3].id=list-service
spring.cloud.gateway.routes[3].uri=lb://list-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/lists/**

spring.cloud.gateway.routes[4].id=card-service
spring.cloud.gateway.routes[4].uri=lb://card-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/cards/**

spring.cloud.gateway.routes[5].id=comment-service
spring.cloud.gateway.routes[5].uri=lb://comment-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v1/comments/**

spring.cloud.gateway.routes[6].id=label-service
spring.cloud.gateway.routes[6].uri=lb://label-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v1/labels/**

spring.cloud.gateway.routes[7].id=notification-service
spring.cloud.gateway.routes[7].uri=lb://notification-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/v1/notifications/**

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG

# CORS Configuration
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowCredentials=false

# Prevent double CORS headers from downstream services giving their own Access-Control-Allow-Origin
spring.cloud.gateway.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE